    />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body class="overflow-auto">
    <div class="bg-overlay grid-pattern"></div>
    <div class="bg-overlay dot-pattern"></div>
    <div class="glow-spot"></div>

    <main
      class="container-fluid min-vh-100 d-flex flex-column justify-content-center align-items-center py-4 py-md-5"
    >
      <a
        href="index.php"
        class="brand mb-4 mb-md-5"
        title="Return to Core System"
      >
        <img src="main-logo.png" alt="Bit2Byte Logo" class="brand-logo" />
        <h1 class="brand-text">Bit<span>2</span>Byte</h1>
      </a>

      <div class="row w-100 justify-content-center m-0">
        <div class="col-12 col-sm-11 col-md-9 col-lg-7 col-xl-5 px-0">
          <div class="auth-card mx-auto w-100">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>

            <div
              class="tabs d-flex justify-content-between justify-content-sm-start"
            >
              <a href="login.php" class="tab-btn">Admin Login</a>
              <a href="signup.html" class="tab-btn active">Member Form</a>
            </div>

            <form
              id="registerForm"
              class="auth-form needs-validation"
              action="signup.php"
              method="post"
              enctype="multipart/form-data"
              novalidate
            >
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <div class="input-wrapper">
                  <i class="material-symbols-outlined input-icon">face</i>
                  <input
                    class="form-input"
                    name="full_name"
                    placeholder="Enter your full name"
                    type="text"
                    autocomplete="name"
                    required
                  />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-wrapper">
                  <i class="material-symbols-outlined input-icon"
                    >alternate_email</i
                  >
                  <input
                    class="form-input"
                    name="email"
                    placeholder="Enter your email"
                    type="email"
                    autocomplete="email"
                    required
                  />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Phone</label>
                <div class="input-wrapper">
                  <i class="material-symbols-outlined input-icon">call</i>
                  <input
                    class="form-input"
                    name="phone"
                    placeholder="Enter your phone"
                    type="tel"
                    autocomplete="tel"
                  />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Student ID</label>
                <div class="input-wrapper">
                  <i class="material-symbols-outlined input-icon">badge</i>
                  <input
                    class="form-input"
                    name="student_id"
                    placeholder="Enter student ID"
                    type="text"
                  />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Department</label>
                <div class="input-wrapper">
                  <i class="material-symbols-outlined input-icon">school</i>
                  <input
                    class="form-input"
                    name="department"
                    placeholder="Enter department"
                    type="text"
                  />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Batch</label>
                <div class="input-wrapper">
                  <i class="material-symbols-outlined input-icon">groups</i>
                  <input
                    class="form-input"
                    name="batch"
                    placeholder="Enter batch"
                    type="text"
                  />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Profile Image</label>
                <div class="input-wrapper">
                  <i class="material-symbols-outlined input-icon">image</i>
                  <input
                    class="form-input"
                    name="member_image"
                    type="file"
                    accept="image/jpeg,image/png,image/webp,image/gif"
                  />
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Skills</label>
                <div class="input-wrapper">
                  <i class="material-symbols-outlined input-icon">code</i>
                  <textarea
                    class="form-input form-textarea"
                    name="skills"
                    placeholder="Your skills"
                    rows="3"
                  ></textarea>
                </div>
              </div>
              <div class="form-group">
                <label class="form-label">Reason For Joining</label>
                <div class="input-wrapper">
                  <i class="material-symbols-outlined input-icon">edit_note</i>
                  <textarea
                    class="form-input form-textarea"
                    name="reason_for_joining"
                    placeholder="Why join Bit2Byte?"
                    rows="3"
                  ></textarea>
                </div>
              </div>
              <p class="policy">
                Member application only. Admin will review and contact you.
              </p>
              <button type="submit" class="btn-submit">
                <span class="btn-text">Submit</span>
                <div class="btn-overlay"></div>
              </button>
            </form>
          </div>
        </div>
      </div>

      <p class="auth-footer">© <span id="current-year">2026</span> Bit2Byte</p>
    </main>

    <script>
      window.addEventListener("load", () => {
        document.getElementById("current-year").textContent =
          new Date().getFullYear();
      });
    </script>

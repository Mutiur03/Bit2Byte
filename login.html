<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Bit2Byte | Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <div class="bg-overlay grid-pattern"></div>
    <div class="bg-overlay dot-pattern"></div>
    <div class="glow-spot"></div>

    <main>
      <a href="index.html" class="brand" title="Return to Core System">
        <img src="main-logo.png" alt="Bit2Byte Logo" class="brand-logo" />
        <h1 class="brand-text">Bit<span>2</span>Byte</h1>
      </a>

      <div class="auth-card">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <div class="tabs">
          <a href="login.html" class="tab-btn active">Login</a>
          <a href="signup.html" class="tab-btn">Sign Up</a>
        </div>

        <form id="loginForm" class="auth-form">
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-wrapper">
              <i class="material-symbols-outlined input-icon"
                >alternate_email</i
              >
              <input
                class="form-input"
                placeholder="Enter your email"
                type="email"
                required
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrapper">
              <i class="material-symbols-outlined input-icon">lock</i>
              <input
                class="form-input"
                placeholder="Enter your password"
                type="password"
                required
              />
            </div>
          </div>
          <div class="form-options">
            <label class="checkbox-group">
              <input type="checkbox" style="margin-right: 8px" />
              Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>
          <button type="submit" class="btn-submit">
            <span class="btn-text">Sign In</span>
            <div class="btn-overlay"></div>
          </button>
        </form>
      </div>

      <p class="auth-footer">© <span id="current-year">2026</span> Bit2Byte</p>
    </main>

    <script>
      window.addEventListener("load", () => {
        document.getElementById("current-year").textContent =
          new Date().getFullYear();
      });
    </script>
  </body>
</html>
